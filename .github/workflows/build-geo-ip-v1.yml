name: BUILD_GEO_IP(v1)

on:
  workflow_dispatch:
    inputs:
      release_archives:
        description: "enable release archives"
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}

jobs:
  pre:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    outputs:
      x_branch: ${{ steps.set_global_params.outputs.x_branch }}
    steps:
      - name: set global params
        id: set_global_params
        run: |
          echo "x_branch=main" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: [pre]
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    #outputs:
    steps:
      #- name: Free Disk-Space
      #  run: df -h && sudo apt-get clean && docker system prune -a -f && sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc && df -h

      - name: (Before)Free Disk-Space
        run: df -h

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3  # Use @main for latest, @v3 for stable
        with:
          #remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          #remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          #remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"  # Use 'rmz' for faster deletion (default: 'rm')
          #rmz_version: "3.1.1"  # Required when rm_cmd is 'rmz'
          testing: false

      - name: (After)Free Disk-Space
        run: df -h

      - uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install System Tools
        run: |
          sudo apt install tree -y

      - name: git clone geoip
        run: |
          mkdir -p ${{ github.workspace }}/build
          cd ${{ github.workspace }}/build
          git clone -b master https://github.com/v2fly/geoip.git
          cd ${{ github.workspace }}/build/geoip
          git submodule update --init --recursive
          go get -u

      - name: cp config
        run: |
          cp -rf ${{ github.workspace }}ext/geoip/config.json ${{ github.workspace }}/build/geoip/config.json

      - name: down data rec
        run: |
          mkdir -p ${{ github.workspace }}/build/geoip/data
          cd ${{ github.workspace }}/build/geoip/data
          rm -rf ${{ github.workspace }}/build/geoip/data/*
          curl -sL https://raw.githubusercontent.com/gaoyifan/china-operator-ip/refs/heads/ip-lists/china46.txt -o china-operator-ip.txt
          tree ${{ github.workspace }}/build/geoip/data

      - name: build
        run: |
          cd ${{ github.workspace }}/build/geoip
          go run ./ -c ./config.json
          tree ${{ github.workspace }}/build/geoip/output

      - name: Upload dat
        uses: actions/upload-artifact@v7
        with:
          name: dat-geo-ip
          compression-level: 9
          path: |
            ${{ github.workspace }}/build/geoip/output/*.dat

  release:
    if: ${{ inputs.release_archives }}
    needs: [pre, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Get current date time
        run: |
          echo "current_date_time=$(date -d '8 hour' -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_ENV"

      - name: Install System Tools
        run: |
          sudo apt install tree -y

      - name: Download apks archives
        uses: actions/download-artifact@v8
        with:
          pattern: "dat*"
          merge-multiple: true
          path: ${{ github.workspace }}/dats

      - name: show apks files
        run: |
          tree ${{ github.workspace }}/dats

      - name: Release archives
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "V-${{ env.current_date_time }}.ip"
          name: "V-${{ env.current_date_time }}.ip"
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: true
          body: |
            geo ext build result.
          files: |
            ${{ github.workspace }}/dats/**

      - name: Release archives
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "daily"
          name: "daily"
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: false
          body: |
            geo ext build result.
          files: |
            ${{ github.workspace }}/dats/**
